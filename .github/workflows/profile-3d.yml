name: GitHub Profile 3D Contribution Graph

on:
  schedule:
    # 03:00 KST
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated graph
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          mkdir -p images
          cp profile-3d-contrib/profile-night-green.svg images/profile-night-green.svg
          git rm -r --ignore-unmatch profile-3d-contrib
          rm -rf profile-3d-contrib
          git add images/profile-night-green.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update 3d contribution graph"
          git push
